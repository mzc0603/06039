<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="经典游戏合集 - 像素拳皇和超级马里奥网页版">
    <meta name="keywords" content="游戏, 拳皇, 马里奥, HTML5游戏">
    <title>经典游戏合集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
        }
        .title {
            font-size: clamp(24px, 6vw, 48px);
            margin-bottom: 10px;
            color: #e74c3c;
            text-shadow: 3px 3px 0 #c0392b;
        }
        .subtitle {
            font-size: clamp(14px, 3vw, 18px);
            color: #f1c40f;
            margin-bottom: 50px;
        }
        .games {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            padding: 20px;
        }
        .game-card {
            width: 280px;
            height: 320px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border-color: #e74c3c;
        }
        .game-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .game-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #fff;
        }
        .game-desc {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
        }
        .play-btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #922b21;
            transition: transform 0.1s;
        }
        .play-btn:hover { transform: translateY(-2px); }
        .play-btn:active { transform: translateY(2px); }
        .footer {
            margin-top: 50px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1 class="title">经典游戏合集</h1>
    <p class="subtitle">像素拳皇 · 超级马里奥</p>
    
    <div class="games">
        <div class="game-card" onclick="window.location.href='index_kof.html'">
            <div class="game-icon">🥊</div>
            <h2 class="game-title">像素拳皇</h2>
            <p class="game-desc">经典2D像素格斗游戏，支持人机对战，包含龙、虎、熊、鹤四个角色，完整必杀技系统。</p>
            <button class="play-btn">开始游戏</button>
        </div>
        
        <div class="game-card" onclick="window.location.href='mario.html'">
            <div class="game-icon">🍄</div>
            <h2 class="game-title">超级马里奥</h2>
            <p class="game-desc">经典横版闯关游戏，包含原版1-1关卡，吃蘑菇成长，顶砖块，跳跃打怪，通关旗杆。</p>
            <button class="play-btn">开始游戏</button>
        </div>
    </div>
    
    <div class="footer">
        <p>使用 HTML5 Canvas + JavaScript 开发 | 支持手机和电脑</p>
    </div>
</body>
</html>
