<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="像素拳皇 - 经典2D像素格斗网页游戏，支持人机对战和双人对战，完美支持手机和电脑键盘操作">
    <meta name="keywords" content="拳皇, 格斗游戏, 像素游戏, HTML5游戏, 街机游戏, KOF, fighting game">
    <meta name="author" content="Pixel KOF">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="像素拳皇 - 经典2D像素格斗游戏">
    <meta property="og:description" content="在线玩经典像素风格拳皇格斗游戏，支持手机触屏和电脑键盘">
    <meta property="og:type" content="game">
    <title>像素拳皇 - 经典2D像素格斗游戏</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%23e74c3c' x='4' y='4' width='24' height='24'/><rect fill='%23c0392b' x='8' y='8' width='16' height='16'/></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: 'Courier New', monospace;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #16213e 0%, #1a1a2e 100%);
        }
        #gameCanvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100%;
            max-height: 100%;
            background: #0f0f1a;
        }
        #touchControls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 35%;
            display: none;
            justify-content: space-between;
            padding: 15px;
            pointer-events: none;
            touch-action: none;
        }
        .touch-btn {
            pointer-events: auto;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            user-select: none;
            -webkit-user-select: none;
            transition: transform 0.05s, background 0.05s, box-shadow 0.05s;
            touch-action: manipulation;
        }
        .touch-btn:active, .touch-btn.active {
            transform: scale(0.88);
            filter: brightness(1.4);
        }
        .touch-btn.pressed {
            background: rgba(255,255,255,0.5) !important;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
        #dpad {
            display: grid;
            grid-template-columns: repeat(3, 65px);
            grid-template-rows: repeat(3, 65px);
            gap: 5px;
        }
        #dpad .touch-btn {
            width: 65px;
            height: 65px;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.25);
            color: #fff;
            font-size: 22px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #actionBtns {
            display: grid;
            grid-template-columns: repeat(3, 72px);
            grid-template-rows: repeat(2, 72px);
            gap: 8px;
        }
        #actionBtns .touch-btn {
            width: 72px;
            height: 72px;
            background: rgba(231,76,60,0.45);
            border: 3px solid rgba(231,76,60,0.8);
            color: #fff;
            font-size: 13px;
            line-height: 1.3;
            box-shadow: 0 3px 10px rgba(231,76,60,0.3);
        }
        #actionBtns .touch-btn.special {
            background: rgba(241,196,15,0.45);
            border-color: rgba(241,196,15,0.8);
            box-shadow: 0 3px 10px rgba(241,196,15,0.3);
        }
        #actionBtns .touch-btn.block-btn {
            background: rgba(52,152,219,0.45);
            border-color: rgba(52,152,219,0.8);
            box-shadow: 0 3px 10px rgba(52,152,219,0.3);
        }
        #startScreen, #selectScreen, #roundScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10,10,20,0.95);
            color: #fff;
            z-index: 100;
        }
        .screen-title {
            font-size: clamp(28px, 6vw, 64px);
            color: #e74c3c;
            text-shadow: 4px 4px 0 #c0392b, 6px 6px 0 rgba(0,0,0,0.5);
            margin-bottom: 30px;
            letter-spacing: 4px;
        }
        .menu-btn {
            padding: 15px 50px;
            margin: 10px;
            font-size: clamp(16px, 3vw, 24px);
            font-family: inherit;
            background: linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 0 #922b21, 0 6px 10px rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #922b21, 0 8px 12px rgba(0,0,0,0.4);
        }
        .menu-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #922b21, 0 3px 6px rgba(0,0,0,0.4);
        }
        .character-select {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        .char-btn {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }
        .char-btn:hover, .char-btn.selected {
            background: rgba(231,76,60,0.3);
            border-color: #e74c3c;
            transform: scale(1.05);
        }
        .char-icon {
            font-size: 40px;
            margin-bottom: 5px;
        }
        #loadingText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
        }
        @media (max-width: 768px) {
            #touchControls {
                display: flex;
            }
        }
        @media (max-height: 500px) {
            #touchControls {
                height: 45%;
            }
            #actionBtns {
                grid-template-rows: repeat(2, 60px);
            }
            #actionBtns .touch-btn {
                width: 64px;
                height: 60px;
                font-size: 12px;
            }
        }
        @media (max-width: 400px) {
            #dpad {
                grid-template-columns: repeat(3, 55px);
                grid-template-rows: repeat(3, 55px);
            }
            #dpad .touch-btn {
                width: 55px;
                height: 55px;
                font-size: 18px;
            }
            #actionBtns {
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(2, 60px);
                gap: 5px;
            }
            #actionBtns .touch-btn {
                width: 60px;
                height: 60px;
                font-size: 11px;
            }
            #touchControls {
                padding: 8px;
            }
        }
        @media (orientation: landscape) and (max-height: 500px) {
            #touchControls {
                height: 50%;
            }
            #dpad {
                grid-template-columns: repeat(3, 70px);
                grid-template-rows: repeat(3, 70px);
            }
            #dpad .touch-btn {
                width: 70px;
                height: 70px;
            }
            #actionBtns {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(2, 80px);
            }
            #actionBtns .touch-btn {
                width: 80px;
                height: 80px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="loadingText">加载中...</div>

        <div id="startScreen" style="display:none;">
            <div class="screen-title">像素拳皇</div>
            <button class="menu-btn" onclick="startGame()">开始游戏</button>
            <button class="menu-btn" onclick="showControls()">操作说明</button>
        </div>

        <div id="selectScreen" style="display:none;">
            <div class="screen-title" style="font-size: clamp(20px, 4vw, 36px);">选择角色</div>
            <div style="margin: 10px 0; color: #aaa;">玩家1 - 使用键盘或触屏</div>
            <div class="character-select" id="playerSelect"></div>
            <div style="margin: 20px 0; color: #aaa;">电脑对手</div>
            <div class="character-select" id="enemySelect"></div>
            <div style="margin-top: 20px;">
                <button class="menu-btn" onclick="startFight()">开始战斗</button>
            </div>
        </div>

        <div id="roundScreen" style="display:none;">
            <div id="roundText" class="screen-title" style="font-size: clamp(36px, 8vw, 72px);">第一回合</div>
        </div>

        <div id="gameOverScreen" style="display:none;">
            <div id="winnerText" class="screen-title">玩家1 胜利!</div>
            <div id="finalScore" style="font-size: 24px; margin: 20px; color: #aaa;">得分: 0</div>
            <button class="menu-btn" onclick="backToMenu()">返回主菜单</button>
            <button class="menu-btn" onclick="restartGame()">再来一局</button>
        </div>

        <div id="touchControls">
            <div id="dpad">
                <div></div>
                <button class="touch-btn" id="btnUp">▲</button>
                <div></div>
                <button class="touch-btn" id="btnLeft">◀</button>
                <button class="touch-btn" id="btnDown">▼</button>
                <button class="touch-btn" id="btnRight">▶</button>
            </div>
            <div id="actionBtns">
                <button class="touch-btn" id="btnLightPunch">轻拳<br>J</button>
                <button class="touch-btn" id="btnHeavyPunch">重拳<br>K</button>
                <button class="touch-btn special" id="btnSpecial">必杀<br>U</button>
                <button class="touch-btn" id="btnLightKick">轻腿<br>L</button>
                <button class="touch-btn" id="btnHeavyKick">重腿<br>;</button>
                <button class="touch-btn block-btn" id="btnBlock">防御<br>S</button>
            </div>
        </div>
    </div>

    <script>
    const CHARACTERS = [
        { id: 'dragon', name: '龙', icon: '🐉', hp: 100, speed: 5, attack: 10, special: 40, color: '#3498db' },
        { id: 'tiger', name: '虎', icon: '🐯', hp: 80, speed: 8, attack: 8, special: 35, color: '#e67e22' },
        { id: 'bear', name: '熊', icon: '🐻', hp: 130, speed: 3, attack: 15, special: 50, color: '#8b4513' },
        { id: 'crane', name: '鹤', icon: '🦢', hp: 90, speed: 6, attack: 12, special: 45, color: '#9b59b6' }
    ];

    const BASE_WIDTH = 960;
    const BASE_HEIGHT = 540;
    const GROUND_Y = 420;
    const GRAVITY = 0.8;
    const JUMP_FORCE = -16;
    const BLOCK_DAMAGE_REDUCTION = 0.5;

    let canvas, ctx;
    let gameState = 'start';
    let player1, player2;
    let selectedPlayerChar = 0;
    let selectedEnemyChar = 2;
    let round = 1;
    let player1Wins = 0;
    let player2Wins = 0;
    let timer = 99;
    let timerInterval = null;
    let score = 0;
    let aiDifficulty = 'normal';
    let audioCtx = null;
    let soundEnabled = true;
    let keys = {};
    let touchKeys = {};
    let animationId = null;

    class Fighter {
        constructor(charData, x, isPlayer, facingRight = true) {
            this.charData = charData;
            this.x = x;
            this.y = GROUND_Y;
            this.width = 64;
            this.height = 80;
            this.velocityX = 0;
            this.velocityY = 0;
            this.hp = charData.hp;
            this.maxHp = charData.hp;
            this.speed = charData.speed;
            this.attackPower = charData.attack;
            this.specialPower = charData.special;
            this.specialMeter = 0;
            this.maxSpecialMeter = 100;
            this.isPlayer = isPlayer;
            this.facingRight = facingRight;
            this.isJumping = false;
            this.isCrouching = false;
            this.isBlocking = false;
            this.isAttacking = false;
            this.attackType = null;
            this.attackFrame = 0;
            this.attackDuration = 0;
            this.isHit = false;
            this.hitFrame = 0;
            this.isDead = false;
            this.comboCount = 0;
            this.animFrame = 0;
            this.animTimer = 0;
            this.state = 'idle';
        }

        update(opponent) {
            if (this.isDead) return;

            if (this.hitFrame > 0) {
                this.hitFrame--;
                if (this.hitFrame === 0) this.isHit = false;
            }

            if (this.attackFrame > 0) {
                this.attackFrame--;
                if (this.attackFrame === 0) {
                    this.isAttacking = false;
                    this.attackType = null;
                }
            }

            if (!this.isAttacking && !this.isHit) {
                if (this.isJumping) {
                    this.state = 'jump';
                } else if (this.isCrouching) {
                    this.state = 'crouch';
                } else if (Math.abs(this.velocityX) > 0.5) {
                    this.state = 'walk';
                } else {
                    this.state = 'idle';
                }
            }

            this.velocityY += GRAVITY;
            this.x += this.velocityX;
            this.y += this.velocityY;

            if (this.y >= GROUND_Y) {
                this.y = GROUND_Y;
                this.velocityY = 0;
                this.isJumping = false;
            }

            if (this.x < 20) this.x = 20;
            if (this.x > BASE_WIDTH - 20 - this.width) this.x = BASE_WIDTH - 20 - this.width;

            if (opponent && !this.isAttacking) {
                this.facingRight = opponent.x > this.x;
            }

            this.animTimer++;
            if (this.animTimer >= 8) {
                this.animTimer = 0;
                this.animFrame = (this.animFrame + 1) % 4;
            }

            this.velocityX *= 0.85;
        }

        moveLeft() {
            if (!this.isAttacking && !this.isDead) {
                this.velocityX = -this.speed;
            }
        }

        moveRight() {
            if (!this.isAttacking && !this.isDead) {
                this.velocityX = this.speed;
            }
        }

        jump() {
            if (!this.isJumping && !this.isAttacking && !this.isDead) {
                this.velocityY = JUMP_FORCE;
                this.isJumping = true;
            }
        }

        crouch(on) {
            if (!this.isAttacking && !this.isDead) {
                this.isCrouching = on;
            }
        }

        block(on) {
            if (!this.isAttacking && !this.isDead) {
                this.isBlocking = on;
            }
        }

        attack(type) {
            if (this.isAttacking || this.isDead || this.isJumping) return false;

            const attackConfigs = {
                lightPunch: { duration: 15, damage: 5 + this.attackPower * 0.3, range: 50 },
                heavyPunch: { duration: 25, damage: 10 + this.attackPower * 0.6, range: 60 },
                lightKick: { duration: 18, damage: 6 + this.attackPower * 0.35, range: 55 },
                heavyKick: { duration: 30, damage: 12 + this.attackPower * 0.7, range: 70 }
            };

            const config = attackConfigs[type];
            if (!config) return false;

            this.isAttacking = true;
            this.attackType = type;
            this.attackFrame = config.duration;
            this.attackDuration = config.duration;
            this.attackDamage = config.damage;
            this.attackRange = config.range;
            this.state = type.includes('Punch') ? 'punch' : 'kick';

            return true;
        }

        specialAttack() {
            if (this.specialMeter < 100 || this.isAttacking || this.isDead || this.isJumping) return false;

            this.specialMeter = 0;
            this.isAttacking = true;
            this.attackType = 'special';
            this.attackFrame = 45;
            this.attackDuration = 45;
            this.attackDamage = this.specialPower;
            this.attackRange = 100;
            this.state = 'special';

            return true;
        }

        takeDamage(damage, knockbackDir) {
            const actualDamage = this.isBlocking ? damage * BLOCK_DAMAGE_REDUCTION : damage;
            this.hp = Math.max(0, this.hp - actualDamage);
            this.isHit = true;
            this.hitFrame = 10;

            if (!this.isBlocking) {
                this.velocityX = knockbackDir * 8;
                this.velocityY = -5;
                this.comboCount++;
            }

            if (this.isBlocking) {
                playSound('block');
            } else {
                playSound('hit');
                this.specialMeter = Math.min(this.maxSpecialMeter, this.specialMeter + 10);
            }

            if (this.hp <= 0) {
                this.isDead = true;
                this.state = 'dead';
            }

            return actualDamage;
        }

        getHitbox() {
            const height = this.isCrouching ? this.height * 0.6 : this.height;
            const yOffset = this.isCrouching ? this.height * 0.4 : 0;
            return {
                x: this.x,
                y: this.y - height + yOffset,
                width: this.width,
                height: height
            };
        }

        getAttackHitbox() {
            if (!this.isAttacking || this.attackFrame <= 0) return null;

            const activeFrame = this.attackDuration - this.attackFrame;
            const hitStart = Math.floor(this.attackDuration * 0.3);
            const hitEnd = Math.floor(this.attackDuration * 0.7);

            if (activeFrame < hitStart || activeFrame > hitEnd) return null;

            const offsetX = this.facingRight ? this.width : -this.attackRange;
            return {
                x: this.x + offsetX,
                y: this.y - this.height * 0.7,
                width: this.attackRange,
                height: 40
            };
        }

        draw(ctx) {
            ctx.save();

            const drawX = this.facingRight ? this.x : this.x + this.width;
            const scaleX = this.facingRight ? 1 : -1;

            ctx.translate(drawX, this.y);
            ctx.scale(scaleX, 1);

            const charColor = this.charData.color;
            const shake = this.isHit ? (Math.random() - 0.5) * 6 : 0;

            if (this.isDead) {
                ctx.translate(shake, 0);
                ctx.fillStyle = '#444';
                ctx.fillRect(0, -this.height, this.width, this.height);
                ctx.fillStyle = '#222';
                ctx.fillRect(10, -this.height + 10, 20, 20);
                ctx.fillRect(34, -this.height + 10, 20, 20);
                ctx.fillStyle = '#000';
                ctx.fillRect(14, -this.height + 14, 12, 12);
                ctx.fillRect(38, -this.height + 14, 12, 12);
            } else if (this.isHit) {
                ctx.translate(shake, 0);
                ctx.fillStyle = '#fff';
                ctx.fillRect(0, -this.height, this.width, this.height);
                ctx.fillStyle = charColor;
                ctx.fillRect(5, -this.height + 5, this.width - 10, this.height - 10);
            } else if (this.state === 'special') {
                const flash = Math.floor(this.attackFrame / 3) % 2 === 0;
                ctx.fillStyle = flash ? '#ffff00' : '#ff6600';
                ctx.fillRect(-10, -this.height - 10, this.width + 20, this.height + 20);

                ctx.fillStyle = '#fff';
                ctx.fillRect(0, -this.height, this.width, this.height);
                ctx.fillStyle = charColor;
                ctx.fillRect(5, -this.height + 5, this.width - 10, this.height - 10);

                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = `rgba(255, 200, 0, ${Math.random() * 0.5})`;
                    ctx.beginPath();
                    ctx.arc(
                        this.width / 2 + (Math.random() - 0.5) * 40,
                        -this.height / 2 + (Math.random() - 0.5) * 40,
                        5 + Math.random() * 10,
                        0, Math.PI * 2
                    );
                    ctx.fill();
                }
            } else {
                ctx.fillStyle = charColor;
                ctx.fillRect(0, -this.height, this.width, this.height);

                ctx.fillStyle = this.charData.color + 'cc';
                ctx.fillRect(5, -this.height + 5, this.width - 10, this.height - 10);

                if (this.state === 'punch' || this.state === 'kick') {
                    const armExtend = this.attackFrame > 0 ?
                        Math.sin((this.attackDuration - this.attackFrame) / this.attackDuration * Math.PI) * 20 : 0;

                    ctx.fillStyle = '#ffcc99';
                    if (this.state === 'punch') {
                        ctx.fillRect(this.width - 5, -this.height * 0.6, this.width * 0.4 + armExtend, 12);
                    } else {
                        ctx.fillRect(this.width * 0.3, -15, this.width * 0.5 + armExtend, 12);
                    }
                }

                ctx.fillStyle = '#222';
                const eyeY = -this.height + 20;
                ctx.fillRect(15, eyeY, 12, 12);
                ctx.fillRect(37, eyeY, 12, 12);

                if (this.isBlocking) {
                    ctx.fillStyle = '#aaa';
                    ctx.fillRect(-5, -this.height, 10, this.height);
                }
            }

            ctx.restore();

            if (this.isAttacking && this.attackType === 'special' && this.attackFrame > 30) {
                for (let i = 0; i < 3; i++) {
                    ctx.strokeStyle = `rgba(255, 200, 0, ${0.5 - i * 0.15})`;
                    ctx.lineWidth = 3 - i;
                    ctx.beginPath();
                    ctx.arc(
                        this.x + this.width / 2 + (this.facingRight ? 1 : -1) * (60 + i * 20),
                        this.y - this.height / 2,
                        20 + i * 10,
                        0, Math.PI * 2
                    );
                    ctx.stroke();
                }
            }
        }
    }

    class AIController {
        constructor(fighter, difficulty) {
            this.fighter = fighter;
            this.difficulty = difficulty;
            this.decisionTimer = 0;
            this.currentAction = null;
            this.aggressiveness = difficulty === 'easy' ? 0.3 : difficulty === 'normal' ? 0.5 : 0.7;
            this.reactionTime = difficulty === 'easy' ? 30 : difficulty === 'normal' ? 15 : 5;
        }

        update(player) {
            if (this.fighter.isDead || this.fighter.isHit) {
                this.decisionTimer = 0;
                this.currentAction = null;
                return;
            }

            this.decisionTimer--;

            if (this.decisionTimer <= 0) {
                this.makeDecision(player);
                this.decisionTimer = this.reactionTime + Math.random() * 20;
            }

            this.executeAction(player);
        }

        makeDecision(player) {
            const distance = Math.abs(this.fighter.x - player.x);
            const rand = Math.random();

            if (this.fighter.specialMeter >= 100 && rand < 0.3 * this.aggressiveness) {
                this.currentAction = 'special';
            } else if (distance < 80 && rand < 0.5 * this.aggressiveness) {
                this.currentAction = Math.random() < 0.5 ? 'attack' : 'special';
            } else if (distance > 150) {
                this.currentAction = 'approach';
            } else if (distance < 60) {
                this.currentAction = Math.random() < 0.4 ? 'backoff' : 'attack';
            } else {
                this.currentAction = Math.random() < 0.3 ? 'jump' : 'idle';
            }

            if (player.isAttacking && Math.random() < 0.4) {
                this.currentAction = 'block';
            }
        }

        executeAction(player) {
            const towardsPlayer = player.x > this.fighter.x;

            switch (this.currentAction) {
                case 'approach':
                    if (towardsPlayer) this.fighter.moveRight();
                    else this.fighter.moveLeft();
                    break;

                case 'backoff':
                    if (towardsPlayer) this.fighter.moveLeft();
                    else this.fighter.moveRight();
                    break;

                case 'attack':
                    const attackTypes = ['lightPunch', 'heavyPunch', 'lightKick', 'heavyKick'];
                    const attack = attackTypes[Math.floor(Math.random() * attackTypes.length)];
                    this.fighter.attack(attack);
                    break;

                case 'special':
                    this.fighter.specialAttack();
                    break;

                case 'jump':
                    this.fighter.jump();
                    break;

                case 'block':
                    this.fighter.block(true);
                    setTimeout(() => this.fighter.block(false), 300);
                    break;
            }
        }
    }

    function initAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            console.log('Audio not supported');
        }
    }

    function playSound(type) {
        if (!audioCtx || !soundEnabled) return;

        try {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            switch (type) {
                case 'hit':
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(150, now);
                    oscillator.frequency.exponentialRampToValueAtTime(50, now + 0.1);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    oscillator.start(now);
                    oscillator.stop(now + 0.1);
                    break;

                case 'block':
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(200, now);
                    oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    oscillator.start(now);
                    oscillator.stop(now + 0.05);
                    break;

                case 'special':
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(100, now);
                    oscillator.frequency.exponentialRampToValueAtTime(400, now + 0.2);
                    oscillator.frequency.exponentialRampToValueAtTime(50, now + 0.4);
                    gainNode.gain.setValueAtTime(0.4, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    oscillator.start(now);
                    oscillator.stop(now + 0.4);
                    break;

                case 'ko':
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(200, now);
                    oscillator.frequency.exponentialRampToValueAtTime(30, now + 0.5);
                    gainNode.gain.setValueAtTime(0.5, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    oscillator.start(now);
                    oscillator.stop(now + 0.5);
                    break;

                case 'countdown':
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, now);
                    gainNode.gain.setValueAtTime(0.2, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    oscillator.start(now);
                    oscillator.stop(now + 0.15);
                    break;

                case 'fight':
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(440, now);
                    oscillator.frequency.setValueAtTime(550, now + 0.1);
                    oscillator.frequency.setValueAtTime(660, now + 0.2);
                    oscillator.frequency.setValueAtTime(880, now + 0.3);
                    gainNode.gain.setValueAtTime(0.3, now);
                    gainNode.gain.setValueAtTime(0.3, now + 0.3);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    oscillator.start(now);
                    oscillator.stop(now + 0.5);
                    break;
            }
        } catch (e) {
            console.log('Sound error:', e);
        }
    }

    function init() {
        canvas = document.getElementById('gameCanvas');
        ctx = canvas.getContext('2d');

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        setupControls();
        setupTouchControls();

        document.getElementById('loadingText').style.display = 'none';
        document.getElementById('startScreen').style.display = 'flex';

        initAudio();
    }

    function resizeCanvas() {
        const container = document.getElementById('gameContainer');
        const containerWidth = container.clientWidth;
        const containerHeight = container.clientHeight;

        const scale = Math.min(
            containerWidth / BASE_WIDTH,
            containerHeight / BASE_HEIGHT
        );

        canvas.width = BASE_WIDTH;
        canvas.height = BASE_HEIGHT;
        canvas.style.width = `${BASE_WIDTH * scale}px`;
        canvas.style.height = `${BASE_HEIGHT * scale}px`;
    }

    function setupControls() {
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            keys[e.code] = true;

            if (gameState === 'fight' && player1 && !player1.isDead) {
                if (e.key.toLowerCase() === 'w' && !player1.isJumping) player1.jump();
                if (e.key.toLowerCase() === 's') player1.crouch(true);
                if (e.key.toLowerCase() === 'j') player1.attack('lightPunch');
                if (e.key.toLowerCase() === 'k') player1.attack('heavyPunch');
                if (e.key.toLowerCase() === 'l') player1.attack('lightKick');
                if (e.key.toLowerCase() === ';') player1.attack('heavyKick');
                if (e.key.toLowerCase() === 'u') player1.specialAttack();
                if (e.key === 'Enter') player1.block(true);
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
            keys[e.code] = false;

            if (player1 && (e.key.toLowerCase() === 's')) player1.crouch(false);
            if (e.key === 'Enter') player1.block(false);
        });
    }

    function setupTouchControls() {
        const setupButton = (id, onPress, onRelease) => {
            const btn = document.getElementById(id);
            if (!btn) return;

            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                btn.classList.add('active', 'pressed');
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                onPress();
            }, { passive: false });

            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                btn.classList.remove('active', 'pressed');
                onRelease();
            }, { passive: false });

            btn.addEventListener('touchcancel', (e) => {
                btn.classList.remove('active', 'pressed');
                onRelease();
            });
        };

        setupButton('btnUp', () => { if (player1 && !player1.isDead) player1.jump(); }, () => {});
        setupButton('btnLeft', () => { touchKeys.left = true; }, () => { touchKeys.left = false; });
        setupButton('btnRight', () => { touchKeys.right = true; }, () => { touchKeys.right = false; });
        setupButton('btnDown', () => { if (player1 && !player1.isDead) player1.crouch(true); }, () => { if (player1 && !player1.isDead) player1.crouch(false); });
        setupButton('btnLightPunch', () => { if (player1 && !player1.isDead) player1.attack('lightPunch'); }, () => {});
        setupButton('btnHeavyPunch', () => { if (player1 && !player1.isDead) player1.attack('heavyPunch'); }, () => {});
        setupButton('btnLightKick', () => { if (player1 && !player1.isDead) player1.attack('lightKick'); }, () => {});
        setupButton('btnHeavyKick', () => { if (player1 && !player1.isDead) player1.attack('heavyKick'); }, () => {});
        setupButton('btnSpecial', () => { if (player1 && !player1.isDead) player1.specialAttack(); }, () => {});
        setupButton('btnBlock', () => { if (player1 && !player1.isDead) player1.block(true); }, () => { if (player1 && !player1.isDead) player1.block(false); });
    }

    function startGame() {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('selectScreen').style.display = 'flex';

        const playerSelectDiv = document.getElementById('playerSelect');
        const enemySelectDiv = document.getElementById('enemySelect');

        playerSelectDiv.innerHTML = '';
        enemySelectDiv.innerHTML = '';

        CHARACTERS.forEach((char, index) => {
            const playerBtn = document.createElement('button');
            playerBtn.className = 'char-btn' + (index === selectedPlayerChar ? ' selected' : '');
            playerBtn.innerHTML = `<span class="char-icon">${char.icon}</span>${char.name}`;
            playerBtn.onclick = () => {
                document.querySelectorAll('#playerSelect .char-btn').forEach(b => b.classList.remove('selected'));
                playerBtn.classList.add('selected');
                selectedPlayerChar = index;
            };
            playerSelectDiv.appendChild(playerBtn);

            const enemyBtn = document.createElement('button');
            enemyBtn.className = 'char-btn' + (index === selectedEnemyChar ? ' selected' : '');
            enemyBtn.innerHTML = `<span class="char-icon">${char.icon}</span>${char.name}`;
            enemyBtn.onclick = () => {
                document.querySelectorAll('#enemySelect .char-btn').forEach(b => b.classList.remove('selected'));
                enemyBtn.classList.add('selected');
                selectedEnemyChar = index;
            };
            enemySelectDiv.appendChild(enemyBtn);
        });
    }

    function showControls() {
        alert(
            '键盘操作:\n\n移动: A/D 或 ←/→\n跳跃: W 或 ↑\n蹲下/防御: S 或 ↓\n轻拳: J\n重拳: K\n轻腿: L\n重腿: ;\n必杀技: U\n防御: Enter'
        );
    }

    function startFight() {
        document.getElementById('selectScreen').style.display = 'none';
        document.getElementById('roundScreen').style.display = 'flex';

        playSound('countdown');

        setTimeout(() => {
            document.getElementById('roundText').textContent = '第二回合';
            playSound('countdown');
        }, 1000);

        setTimeout(() => {
            document.getElementById('roundText').textContent = '开始!';
            playSound('fight');
        }, 2000);

        setTimeout(() => {
            document.getElementById('roundScreen').style.display = 'none';
            initFight();
        }, 3000);
    }

    function initFight() {
        const playerChar = CHARACTERS[selectedPlayerChar];
        const enemyChar = CHARACTERS[selectedEnemyChar];

        player1 = new Fighter(playerChar, 150, true, true);
        player2 = new Fighter(enemyChar, BASE_WIDTH - 150 - 64, false, false);

        player2.ai = new AIController(player2, aiDifficulty);

        gameState = 'fight';
        timer = 99;

        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (gameState === 'fight') {
                timer--;
                if (timer <= 10) playSound('countdown');
                if (timer <= 0) {
                    timer = 0;
                    endRound();
                }
            }
        }, 1000);

        if (animationId) cancelAnimationFrame(animationId);
        gameLoop();
    }

    function gameLoop() {
        if (gameState !== 'fight') return;

        update();
        render();

        animationId = requestAnimationFrame(gameLoop);
    }

    function update() {
        if (keys['a'] || keys['arrowleft'] || touchKeys.left) {
            player1.moveLeft();
        }
        if (keys['d'] || keys['arrowright'] || touchKeys.right) {
            player1.moveRight();
        }

        player1.update(player2);

        if (player2.ai) {
            player2.ai.update(player1);
        }
        player2.update(player1);

        checkCollisions();

        if (player1.isDead || player2.isDead) {
            setTimeout(endRound, 1500);
            gameState = 'roundEnd';
        }
    }

    function checkCollisions() {
        if (!player1.isAttacking || !player2) return;

        const attackBox = player1.getAttackHitbox();
        const hitBox = player2.getHitbox();

        if (!attackBox) return;

        if (attackBox.x < hitBox.x + hitBox.width &&
            attackBox.x + attackBox.width > hitBox.x &&
            attackBox.y < hitBox.y + hitBox.height &&
            attackBox.y + attackBox.height > hitBox.y) {

            const damage = player1.attackDamage;
            const knockback = player1.facingRight ? 1 : -1;

            const actualDamage = player2.takeDamage(damage, knockback);

            if (!player2.isBlocking) {
                score += Math.floor(actualDamage * (1 + player2.comboCount * 0.1));
                player1.specialMeter = Math.min(player1.maxSpecialMeter, player1.specialMeter + 5);
            }

            player1.isAttacking = false;
            player1.attackFrame = 0;
            player1.attackType = null;
        }
    }

    function render() {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

        drawBackground();

        if (player1) player1.draw(ctx);
        if (player2) player2.draw(ctx);

        drawUI();
    }

    function drawBackground() {
        const gradient = ctx.createLinearGradient(0, 0, 0, BASE_HEIGHT);
        gradient.addColorStop(0, '#16213e');
        gradient.addColorStop(0.6, '#1a1a2e');
        gradient.addColorStop(1, '#0f0f1a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

        ctx.fillStyle = '#2c3e50';
        for (let i = 0; i < 8; i++) {
            const x = i * 150 - 50;
            const h = 100 + Math.sin(i * 1.5) * 60;
            ctx.fillRect(x, GROUND_Y - h, 100, h);
            ctx.fillStyle = '#34495e';
            ctx.fillRect(x + 10, GROUND_Y - h + 10, 20, 30);
            ctx.fillRect(x + 60, GROUND_Y - h + 10, 20, 30);
            ctx.fillStyle = '#2c3e50';
        }

        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, GROUND_Y, BASE_WIDTH, BASE_HEIGHT - GROUND_Y);

        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(0, GROUND_Y, BASE_WIDTH, 4);

        ctx.fillStyle = 'rgba(231, 76, 60, 0.3)';
        for (let i = 0; i < BASE_WIDTH; i += 40) {
            ctx.fillRect(i, GROUND_Y, 20, 2);
        }
    }

    function drawUI() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, BASE_WIDTH, 70);

        drawHealthBar(20, 15, 350, 25, player1.hp, player1.maxHp, '#3498db', player1.charData.color);
        drawHealthBar(BASE_WIDTH - 370, 15, 350, 25, player2.hp, player2.maxHp, '#e74c3c', player2.charData.color);

        drawSpecialMeter(20, 45, 150, 12, player1.specialMeter, player1.maxSpecialMeter);
        drawSpecialMeter(BASE_WIDTH - 170, 45, 150, 12, player2.specialMeter, player2.maxSpecialMeter);

        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px "Courier New", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(timer.toString().padStart(2, '0'), BASE_WIDTH / 2, 42);

        ctx.font = 'bold 16px "Courier New", monospace';
        ctx.textAlign = 'left';
        ctx.fillStyle = player1.charData.color;
        ctx.fillText(player1.charData.name, 25, 12);
        ctx.textAlign = 'right';
        ctx.fillStyle = player2.charData.color;
        ctx.fillText(player2.charData.name, BASE_WIDTH - 25, 12);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#f1c40f';
        ctx.font = 'bold 18px "Courier New", monospace';
        ctx.fillText(`得分: ${score}`, BASE_WIDTH - 20, 65);

        ctx.textAlign = 'left';
        ctx.fillStyle = '#aaa';
        ctx.font = '14px "Courier New", monospace';
        ctx.fillText(`第 ${round} 回合`, 20, 65);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#e74c3c';
        ctx.font = 'bold 14px "Courier New", monospace';
        ctx.fillText(`${player1Wins} 胜`, BASE_WIDTH / 2 - 50, 65);
        ctx.fillText(`${player2Wins} 胜`, BASE_WIDTH / 2 + 50, 65);
    }

    function drawHealthBar(x, y, width, height, current, max, color, charColor) {
        ctx.fillStyle = '#333';
        ctx.fillRect(x, y, width, height);

        const healthPercent = current / max;
        const gradient = ctx.createLinearGradient(x, y, x, y + height);
        gradient.addColorStop(0, color);
        gradient.addColorStop(1, charColor);
        ctx.fillStyle = gradient;
        ctx.fillRect(x + 2, y + 2, (width - 4) * healthPercent, height - 4);

        if (healthPercent < 0.3) {
            ctx.fillStyle = `rgba(255, 0, 0, ${0.3 + Math.sin(Date.now() / 100) * 0.2})`;
            ctx.fillRect(x + 2, y + 2, (width - 4) * healthPercent, height - 4);
        }

        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, width, height);
    }

    function drawSpecialMeter(x, y, width, height, current, max) {
        ctx.fillStyle = '#222';
        ctx.fillRect(x, y, width, height);

        const percent = current / max;
        const gradient = ctx.createLinearGradient(x, y, x + width, y);
        gradient.addColorStop(0, '#f39c12');
        gradient.addColorStop(0.5, '#f1c40f');
        gradient.addColorStop(1, '#f39c12');
        ctx.fillStyle = gradient;
        ctx.fillRect(x + 1, y + 1, (width - 2) * percent, height - 2);

        if (percent >= 1) {
            ctx.fillStyle = `rgba(255, 255, 0, ${0.5 + Math.sin(Date.now() / 50) * 0.3})`;
            ctx.fillRect(x + 1, y + 1, width - 2, height - 2);
        }

        ctx.strokeStyle = '#555';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, width, height);

        ctx.fillStyle = '#fff';
        ctx.font = '10px "Courier New"';
        ctx.textAlign = 'center';
        ctx.fillText('必杀', x + width / 2, y + height - 2);
    }

    function endRound() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        let winner = null;
        if (player1.isDead) {
            winner = player2;
            player2Wins++;
        } else if (player2.isDead) {
            winner = player1;
            player1Wins++;
        } else if (timer <= 0) {
            if (player1.hp > player2.hp) {
                winner = player1;
                player1Wins++;
            } else if (player2.hp > player1.hp) {
                winner = player2;
                player2Wins++;
            }
        }

        if (player1Wins >= 2 || player2Wins >= 2 || (player1.isDead && player2.isDead)) {
            if (player1.isDead && player2.isDead) {
                if (player1Wins > player2Wins) winner = player1;
                else if (player2Wins > player1Wins) winner = player2;
            }
            endGame(winner);
        } else {
            round++;
            if (timer <= 0 || player1.isDead || player2.isDead) {
                setTimeout(() => {
                    document.getElementById('roundScreen').style.display = 'flex';
                    document.getElementById('roundText').textContent = `第 ${round} 回合`;
                    playSound('countdown');

                    setTimeout(() => {
                        document.getElementById('roundScreen').style.display = 'none';
                        initFight();
                    }, 2000);
                }, 1000);
            }
        }
    }

    function endGame(winner) {
        gameState = 'gameOver';
        playSound('ko');

        const winnerText = document.getElementById('winnerText');
        const finalScore = document.getElementById('finalScore');

        if (winner === player1) {
            winnerText.textContent = '玩家1 胜利!';
            winnerText.style.color = '#3498db';
        } else if (winner === player2) {
            winnerText.textContent = '电脑 胜利!';
            winnerText.style.color = '#e74c3c';
        } else {
            winnerText.textContent = '平局!';
            winnerText.style.color = '#f1c40f';
        }

        finalScore.textContent = `最终得分: ${score}`;

        document.getElementById('gameOverScreen').style.display = 'flex';
    }

    function backToMenu() {
        document.getElementById('gameOverScreen').style.display = 'none';
        document.getElementById('startScreen').style.display = 'flex';
        gameState = 'start';
        round = 1;
        player1Wins = 0;
        player2Wins = 0;
        score = 0;
    }

    function restartGame() {
        document.getElementById('gameOverScreen').style.display = 'none';
        round = 1;
        player1Wins = 0;
        player2Wins = 0;
        startFight();
    }

    window.onload = init;
    </script>
</body>
